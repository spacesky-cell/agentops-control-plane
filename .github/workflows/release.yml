name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate-build:
    name: Validate and build release artifacts
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      EXPECTED_REPOSITORY: spacesky-cell/agentpermit
      ACTUAL_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
          cache: pip
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - name: Validate release repository
        shell: bash
        run: |
          if [ "$ACTUAL_REPOSITORY" != "$EXPECTED_REPOSITORY" ]; then
            echo "Release workflow requires $EXPECTED_REPOSITORY; got $ACTUAL_REPOSITORY" >&2
            exit 1
          fi
      - run: python -m pip install -e ".[dev]"
      - name: Validate source release metadata
        run: python scripts/validate_release.py --tag "$RELEASE_TAG"
      - run: ruff format --check agentpermit tests scripts
      - run: ruff check agentpermit tests scripts
      - run: mypy --no-incremental agentpermit
      - run: python -m pytest -q
      - run: npm test
      - run: python -m agentpermit --home "$EVAL_HOME" eval --tasks examples/tasks.jsonl --auto-approve
        env:
          EVAL_HOME: ${{ runner.temp }}/eval
      - run: python -m build
      - shell: bash
        run: echo "TARBALL=$(npm pack --silent)" >> "$GITHUB_ENV"
      - run: node scripts/smoke_npm_artifact.mjs
      - name: Validate built release artifacts
        run: >-
          python scripts/validate_release.py
          --tag "$RELEASE_TAG"
          --npm-tgz "$TARBALL"
          --wheel dist/agentpermit-*.whl
          --sdist dist/agentpermit-*.tar.gz
      - shell: bash
        run: |
          mkdir release-artifacts
          cp "$TARBALL" dist/*.whl dist/*.tar.gz release-artifacts/
          (cd release-artifacts && sha256sum * > SHA256SUMS)
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 7
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-tools
          path: scripts/publish_npm.mjs
          if-no-files-found: error
          retention-days: 7

  publish-npm:
    name: Publish npm package
    needs: validate-build
    if: github.repository == 'spacesky-cell/agentpermit'
    runs-on: ubuntu-latest
    environment: npm
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: release-artifacts
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-tools
          path: release-tools
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - shell: bash
        run: echo "TARBALL=$(find release-artifacts -maxdepth 1 -name 'agentpermit-*.tgz' -print -quit)" >> "$GITHUB_ENV"
      - run: node release-tools/publish_npm.mjs "$TARBALL"

  github-release:
    name: Create or update GitHub Release
    needs: publish-npm
    if: github.repository == 'spacesky-cell/agentpermit'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: release-artifacts
      - name: Create release if needed and upload all artifacts
        shell: bash
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --verify-tag --generate-notes
          fi
          gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
