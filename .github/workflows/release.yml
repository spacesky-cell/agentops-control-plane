name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate-build:
    name: Validate and build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check agentpermit tests scripts
      - run: ruff check agentpermit tests scripts
      - run: mypy --no-incremental agentpermit
      - run: python -m pytest --cov=agentpermit --cov-report=term-missing --cov-fail-under=90
      - run: npm test
      - run: python -m agentpermit --home "${{ runner.temp }}/eval" eval --tasks examples/tasks.jsonl --auto-approve
      - run: python -m build
      - shell: bash
        run: echo "TARBALL=$(npm pack --silent)" >> "$GITHUB_ENV"
      - run: node scripts/smoke_npm_artifact.mjs "${{ env.TARBALL }}"
      - run: >-
          python scripts/validate_release.py
          --tag "${{ github.ref_name }}"
          --npm-tgz "${{ env.TARBALL }}"
          --wheel dist/agentpermit-*.whl
          --sdist dist/agentpermit-*.tar.gz
      - shell: bash
        run: |
          mkdir release-artifacts
          cp "${TARBALL}" dist/*.whl dist/*.tar.gz release-artifacts/
          (cd release-artifacts && sha256sum * > SHA256SUMS)
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 7

  publish-npm:
    name: Publish npm package
    needs: validate-build
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm publish release-artifacts/agentpermit-*.tgz --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts
      - run: gh release create "${{ github.ref_name }}" release-artifacts/* --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
