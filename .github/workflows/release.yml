name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate-build:
    name: Validate and build release artifacts
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      EXPECTED_REPOSITORY: spacesky-cell/agentpermit
      ACTUAL_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - name: Validate release repository
        shell: bash
        run: |
          if [ "$ACTUAL_REPOSITORY" != "$EXPECTED_REPOSITORY" ]; then
            echo "Release workflow requires $EXPECTED_REPOSITORY; got $ACTUAL_REPOSITORY" >&2
            exit 1
          fi
      - run: python -m pip install -e ".[dev]"
      - name: Validate source release metadata
        run: python scripts/validate_release.py --tag "$RELEASE_TAG"
      - run: ruff format --check agentpermit tests scripts
      - run: ruff check agentpermit tests scripts
      - run: mypy --no-incremental agentpermit
      - run: python -m pytest --cov=agentpermit --cov-report=term-missing --cov-fail-under=90
      - run: npm test
      - run: python -m agentpermit --home "$EVAL_HOME" eval --tasks examples/tasks.jsonl --auto-approve
        env:
          EVAL_HOME: ${{ runner.temp }}/eval
      - run: python -m build
      - shell: bash
        run: echo "TARBALL=$(npm pack --silent)" >> "$GITHUB_ENV"
      - run: node scripts/smoke_npm_artifact.mjs
      - name: Validate built release artifacts
        run: >-
          python scripts/validate_release.py
          --tag "$RELEASE_TAG"
          --npm-tgz "$TARBALL"
          --wheel dist/agentpermit-*.whl
          --sdist dist/agentpermit-*.tar.gz
      - shell: bash
        run: |
          mkdir release-artifacts
          cp "$TARBALL" dist/*.whl dist/*.tar.gz release-artifacts/
          (cd release-artifacts && sha256sum * > SHA256SUMS)
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-artifacts
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 7
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-tools
          path: scripts/publish_npm.mjs
          if-no-files-found: error
          retention-days: 7

  publish-npm:
    name: Publish npm package
    needs: validate-build
    if: github.repository == 'spacesky-cell/agentpermit'
    runs-on: ubuntu-latest
    environment: npm
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-artifacts
          path: release-artifacts
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-tools
          path: release-tools
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - shell: bash
        run: echo "TARBALL=$(find release-artifacts -maxdepth 1 -name 'agentpermit-*.tgz' -print -quit)" >> "$GITHUB_ENV"
      - run: node release-tools/publish_npm.mjs "$TARBALL"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create or update GitHub Release
    needs: publish-npm
    if: github.repository == 'spacesky-cell/agentpermit'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-artifacts
          path: release-artifacts
      - name: Create release if needed and upload all artifacts
        shell: bash
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --verify-tag --generate-notes
          fi
          gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
