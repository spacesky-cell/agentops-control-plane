name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check agentpermit tests scripts
      - run: ruff check agentpermit tests scripts
      - run: mypy --no-incremental agentpermit
      - run: python -m pytest --cov=agentpermit --cov-report=term-missing --cov-fail-under=90

  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q

  windows-python:
    name: Security-sensitive Python tests on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q

  node:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm test

  launcher:
    name: Installed launcher on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - run: npm test
      - run: npm pack --dry-run
      - shell: bash
        run: echo "TARBALL=$(npm pack --silent)" >> "$GITHUB_ENV"
      - run: node scripts/smoke_npm_artifact.mjs

  package:
    name: Build, eval, and validate packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - run: python -m pip install -e ".[dev]"
      - id: package-version
        shell: bash
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - run: python scripts/validate_release.py --tag "$RELEASE_TAG"
        env:
          RELEASE_TAG: ${{ steps.package-version.outputs.tag }}
      - run: python -m build
      - run: npm pack --dry-run
      - shell: bash
        run: echo "TARBALL=$(npm pack --silent)" >> "$GITHUB_ENV"
      - run: python -m agentpermit --home "$EVAL_HOME" eval --tasks examples/tasks.jsonl --auto-approve
        env:
          EVAL_HOME: ${{ runner.temp }}/eval
      - run: >-
          python scripts/validate_release.py
          --tag "$RELEASE_TAG"
          --npm-tgz "$TARBALL"
          --wheel dist/agentpermit-*.whl
          --sdist dist/agentpermit-*.tar.gz
        env:
          RELEASE_TAG: ${{ steps.package-version.outputs.tag }}
      - run: node scripts/smoke_npm_artifact.mjs
