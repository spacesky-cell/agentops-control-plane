name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check agentpermit tests scripts
      - run: ruff check agentpermit tests scripts
      - run: mypy --no-incremental agentpermit
      - run: python -m coverage run --parallel-mode -m pytest
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-ubuntu
          path: .coverage.*
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q

  coverage:
    name: Combined cross-platform coverage
    needs: [quality, windows-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
          path: coverage-data
          merge-multiple: true
      - run: python -m coverage combine coverage-data
      - run: python -m coverage report --fail-under=90

  windows-python:
    name: Security-sensitive Python tests on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m coverage run --parallel-mode -m pytest
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-windows
          path: .coverage.*
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  node:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm test

  launcher:
    name: Installed launcher on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - run: npm test
      - run: npm pack --dry-run
      - shell: bash
        run: echo "TARBALL=$(npm pack --silent)" >> "$GITHUB_ENV"
      - run: node scripts/smoke_npm_artifact.mjs

  package:
    name: Build, eval, and validate packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
          cache: pip
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - run: python -m pip install -e ".[dev]"
      - id: package-version
        shell: bash
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - run: python scripts/validate_release.py --tag "$RELEASE_TAG"
        env:
          RELEASE_TAG: ${{ steps.package-version.outputs.tag }}
      - run: python -m build
      - run: npm pack --dry-run
      - shell: bash
        run: echo "TARBALL=$(npm pack --silent)" >> "$GITHUB_ENV"
      - run: python -m agentpermit --home "$EVAL_HOME" eval --tasks examples/tasks.jsonl --auto-approve
        env:
          EVAL_HOME: ${{ runner.temp }}/eval
      - run: >-
          python scripts/validate_release.py
          --tag "$RELEASE_TAG"
          --npm-tgz "$TARBALL"
          --wheel dist/agentpermit-*.whl
          --sdist dist/agentpermit-*.tar.gz
        env:
          RELEASE_TAG: ${{ steps.package-version.outputs.tag }}
      - run: node scripts/smoke_npm_artifact.mjs
