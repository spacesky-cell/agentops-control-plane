name: Bug report
description: Report a reproducible AgentPermit defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, private repository content, runtime databases, or personal paths. Report security issues privately through SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 0.2.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options: [MCP stdio, Policy and approvals, Tool execution, Dashboard, CLI, npm launcher, Packaging, Documentation]
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include commands, sanitized inputs, and the smallest repository shape needed to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized evidence
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, Node.js version, MCP client
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed secrets, tokens, private code, and personal paths.
          required: true
        - label: This is not a vulnerability report.
          required: true
